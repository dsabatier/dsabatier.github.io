<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDL3</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
        }

        .container {
            margin: 0 auto;
            max-width: 1280px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #controls {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 4px;
            justify-content: center;
            align-items: center;
            padding: 10px 0 4px;
            color: #888;
            font-family: sans-serif;
            font-size: 12px;
        }

        #controls kbd {
            display: inline-block;
            background: #1a1a1a;
            border: 1px solid #444;
            border-bottom: 3px solid #444;
            border-radius: 3px;
            padding: 1px 5px;
            font-size: 11px;
            color: #ccc;
            font-family: sans-serif;
        }

        .ctrl-sep {
            color: #444;
        }
    </style>
  <script type="module" crossorigin src="/games/idl3/assets/index-nWoLgWTD.js"></script>
</head>

<body>
    <div class="container">
        <div id="game"></div>
        <div id="controls">
            <span class="ctrl-group"><kbd>↑ ↓ ← →</kbd> Move cursor</span>
            <span class="ctrl-sep">·</span>
            <span class="ctrl-group"><kbd>Space</kbd> Select / swap</span>
            <span class="ctrl-sep">·</span>
            <span class="ctrl-group"><kbd>Esc</kbd> Cancel</span>
            <span class="ctrl-sep">·</span>
            <span class="ctrl-group"><kbd>Shift</kbd> + <kbd>↑ ↓ ← →</kbd> Collapse</span>
        </div>
    </div>
</body>

</html>
